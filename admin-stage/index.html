<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Cache Control Meta Tags - Kalıcı çözüm -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta http-equiv="Last-Modified" content="0" />
    
    <!-- Prevent browser caching -->
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="-1" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=AR+One+Sans:wght@400..800&family=JetBrains+Mono:wght@400..800&display=swap" rel="stylesheet" />
    
    <title>admin-otomuhasebe</title>
    
    <script>
      // Browser cache'i tamamen devre dışı bırak
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
      
      // Cache API'yi temizle
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name);
          }
        });
      }
      
      // LocalStorage ve SessionStorage için version control - AGGRESSIVE
      const BUILD_VERSION = 'v2.0.0-' + Date.now(); // Yeni tema versiyonu
      const storedVersion = localStorage.getItem('appVersion');
      
      if (storedVersion !== BUILD_VERSION) {
        console.log('[CACHE CLEAR] Clearing all cache due to version change:', storedVersion, '->', BUILD_VERSION);
        localStorage.clear();
        sessionStorage.clear();
        localStorage.setItem('appVersion', BUILD_VERSION);
        
        // Hard reload ile tüm kaynakları temizle
        if (storedVersion) {
          window.location.reload(true);
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
