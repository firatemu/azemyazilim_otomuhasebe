services:
  user-panel-staging:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../../panel-stage/client:/app
      - panel_stage_node_modules:/app/node_modules
      - panel_stage_next_cache:/app/.next
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_DEVELOPER_MODE: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "corepack enable && pnpm install && pnpm dev --turbo"

volumes:
  panel_stage_node_modules:
  panel_stage_next_cache:
