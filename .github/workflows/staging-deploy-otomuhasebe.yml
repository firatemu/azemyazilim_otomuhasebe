# Staging ortamı: https://staging.otomuhasebe.com/ (sunucu IP: 76.13.14.43)
# Build GitHub'da, image'lar GHCR'a push edilir; sunucuda pull + up.
# Tetikleyici: sadece workflow_dispatch (manuel)
# Gerekli secret: STAGING_OTOMUHASEBE_SSH_KEY (76.13.14.43 için SSH private key)

name: Staging Deploy (staging.otomuhasebe.com)

on:
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Sadece build & GHCR push (deploy atla)"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/firatemu/otomuhasebe-backend-staging:latest
  IMAGE_PANEL: ghcr.io/firatemu/otomuhasebe-user-panel-staging:latest

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend-staging
        uses: docker/build-push-action@v5
        with:
          context: ./api-stage
          file: ./api-stage/server/Dockerfile.staging.prod
          push: true
          tags: ${{ env.IMAGE_BACKEND }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  build-panel:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push user-panel-staging
        uses: docker/build-push-action@v5
        with:
          context: ./panel-stage/client
          file: ./panel-stage/client/Dockerfile.staging.prod
          push: true
          tags: ${{ env.IMAGE_PANEL }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://staging.otomuhasebe.com
            API_PROXY_TARGET=http://backend-staging:3000
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs:
      - build-backend
      - build-panel
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && !inputs.skip_deploy }}
    continue-on-error: true

    steps:
      - name: Deploy to staging.otomuhasebe.com (76.13.14.43)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.14.43
          username: root
          key: ${{ secrets.STAGING_OTOMUHASEBE_SSH_KEY }}
          script_timeout: 5m
          script: |
            set -e
            if [ -n "${{ secrets.GHCR_PAT }}" ]; then
              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            fi
            cd /var/www/otomuhasebe
            docker compose -f docker/compose/docker-compose.base.yml -f docker/compose/docker-compose.staging.ghcr.yml pull
            docker compose -f docker/compose/docker-compose.base.yml -f docker/compose/docker-compose.staging.ghcr.yml up -d
            echo "Staging deploy tamamlandı: https://staging.otomuhasebe.com"
