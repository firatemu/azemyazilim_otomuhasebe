# Docker Compose Main Entry Point
# This file provides a convenient entry point for split compose files

# Usage:
#   docker compose --env-file docker/compose/.env.staging -f docker/compose/docker-compose.base.yml -f docker/compose/docker-compose.staging.yml up -d
#   docker compose --env-file docker/compose/.env.production -f docker/compose/docker-compose.base.yml -f docker/compose/docker-compose.prod.yml up -d

# For simplicity, use the Makefile commands:
#   make up-staging
#   make up-prod
#   make logs-staging
#   make logs-prod
#   make down-staging
#   make down-prod
#   make backup-staging
#   make backup-prod

version: "3.9"

# Include profiles to manage service groups
# Available profiles:
#   - proxy: Caddy reverse proxy
#   - db: PostgreSQL database
#   - cache: Redis cache
#
# Example: docker compose --env-file docker/compose/.env.staging -f docker/compose/docker-compose.base.yml -f docker/compose/docker-compose.staging.yml up -d --profile proxy,db,cache
