services:
  backend:
    image: otomuhasebe/backend:${IMAGE_TAG:-latest}
    build:
      context: ../../api-prod
      dockerfile: server/Dockerfile
    ports:
      - "3021:3000"
    env_file:
      - .env.production
    depends_on:
      - postgres
    networks: [app_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  admin-panel:
    image: otomuhasebe/admin-panel:${IMAGE_TAG:-latest}
    build:
      context: ../../admin-otomuhasebe
      dockerfile: Dockerfile
    ports:
      - "3022:80"
    env_file:
      - .env.production
    networks: [app_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  landing-page:
    image: otomuhasebe/landing-page:${IMAGE_TAG:-latest}
    build:
      context: ../../otomuhasebe-landing
      dockerfile: Dockerfile
    ports:
      - "3023:3000"
    env_file:
      - .env.production
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_BASE_URL: https://api.otomuhasebe.com
    networks: [app_net]
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  user-panel:
    image: otomuhasebe/user-panel:${IMAGE_TAG:-latest}
    build:
      context: ../../panel-prod/client
      dockerfile: Dockerfile
    ports:
      - "3025:3000"
    env_file:
      - .env.production
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_BASE_URL: https://api.otomuhasebe.com
    networks: [app_net]
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s
    restart: unless-stopped
