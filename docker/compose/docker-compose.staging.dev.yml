# HOT RELOAD / DEV CONFIGURATION
# Usage: docker compose -f docker-compose.base.yml -f docker-compose.staging.dev.yml up -d

services:
  backend-staging:
    build:
      context: ../../api-stage
      dockerfile: server/Dockerfile.staging.prod
    env_file:
      - .env.staging
    networks: [ app_net ]
    ports:
      - "3020:3000"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://0.0.0.0:3000/api/health" ]
      interval: 30s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  user-panel-staging:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - .env.staging
    environment:
      NODE_ENV: development
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "false"
      WATCHPACK_POLLING: "false"
    volumes:
      - ../../panel-stage/client:/app
      - panel_stage_node_modules:/app/node_modules
      - panel_stage_next_cache:/app/.next
    command: sh -c "corepack enable && pnpm install && pnpm dev:fast"
    networks: [ app_net ]
    depends_on:
      - backend-staging
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/login" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

volumes:
  api_stage_node_modules:
  panel_stage_node_modules:
  panel_stage_next_cache:
