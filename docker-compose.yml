# Docker Compose Main Entry Point
# This file provides a convenient entry point for split compose files

# Usage:
#   docker compose --env-file .env.staging -f infra/compose/docker-compose.base.yml -f infra/compose/docker-compose.staging.yml up -d
#   docker compose --env-file .env.production -f infra/compose/docker-compose.base.yml -f infra/compose/docker-compose.prod.yml up -d

# For simplicity, use the Makefile commands:
#   make up-staging
#   make up-staging-dev
#   make logs-staging
#   make logs-staging-dev
#   make down-staging
#   make down-staging-dev
#   make migrate-staging
#   make backup-staging

version: "3.9"

# Include profiles to manage service groups
# Available profiles:
#   - proxy: Caddy reverse proxy
#   - db: PostgreSQL database
#   - cache: Redis cache
#
# Example: docker compose --env-file .env.staging -f infra/compose/docker-compose.base.yml -f infra/compose/docker-compose.staging.yml up -d --profile proxy,db,cache
